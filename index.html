<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopMart - Home</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="icon" type="image" href="https://t4.ftcdn.net/jpg/01/95/22/47/360_F_195224769_BH3CEimtC15FIpgP5zhveQQOrmotfULg.jpg">
    
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <a href="index.html">Shop<span>Mart</span></a>
            </div>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="index.html" class="nav-link active">Home</a>
                </li>
                <li class="nav-item">
                    <a href="products.html" class="nav-link">Products</a>
                </li>
                <li class="nav-item">
                    <a href="contact.html" class="nav-link">Contact</a>
                </li>
                <li class="nav-item cart-icon">
                    <a href="#" class="nav-link" id="cartLink">
                        <i class="fas fa-shopping-cart"></i>
                        <span class="cart-count" id="cartCount">0</span>
                    </a>
                </li>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <h1>Welcome to ShopMart</h1>
            <p>Discover amazing products at unbeatable prices</p>
            <a href="products.html" class="cta-button">Shop Now</a>
        </div>
    </section>

    <section class="featured">
        <div class="container">
            <h2>Featured Products</h2>
            <div class="products-grid" id="featuredProducts">
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
